<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="CA logo">
  <!--
    Clean placeholder CA monogram. Replace this entire file with your
    firm's official logo (kept at filename ca-logo.svg) and the favicon,
    sidebar, login screen, and 2FA screen will all pick it up
    automatically — no code changes required.
  -->
  <defs>
    <linearGradient id="ca-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="ca-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#ca-bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#ca-shine)"/>
  <text
    x="32" y="44"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="30"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-1.5"
  >CA</text>
  <line x1="14" y1="51" x2="50" y2="51" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
</svg>
